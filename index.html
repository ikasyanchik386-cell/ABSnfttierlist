<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Abstract NFT Tier List</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}body{background:#060608;font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}@keyframes dot-blink{0%,100%{opacity:0;transform:scale(0.6);}40%,60%{opacity:1;transform:scale(1);}}@keyframes title-glow{0%,100%{text-shadow:0 0 20px rgba(34,197,94,0);letter-spacing:8px;}50%{text-shadow:0 0 30px rgba(34,197,94,0.6),0 0 60px rgba(34,197,94,0.25);letter-spacing:10px;}}@keyframes title-fade-in{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}@keyframes ctx-appear{from{opacity:0;transform:scale(0.93) translateY(-4px);}to{opacity:1;transform:none;}}@keyframes link-pulse{0%,100%{opacity:1;filter:drop-shadow(0 0 8px #22c55e);}50%{opacity:0.4;filter:none;}}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:rgba(255,255,255,0.02);}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}#bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}#navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:rgba(6,6,8,0.72);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:flex-end;padding:0 20px;gap:8px;}.nav-btn{display:flex;align-items:center;gap:5px;border-radius:9px;padding:5px 13px;font-size:10px;font-family:'Space Mono',monospace;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;border:1px solid;}#btn-undo{background:rgba(155,89,255,0.12);border-color:rgba(155,89,255,0.35);color:#b47fff;}#btn-undo:disabled{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.07);color:rgba(255,255,255,0.2);cursor:not-allowed;}#btn-upload{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:#22c55e;padding:5px 14px;}#btn-bake{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.3);color:#FFD700;}.undo-badge{background:rgba(155,89,255,0.3);border-radius:4px;padding:0 5px;font-size:9px;}#toast{position:fixed;top:62px;right:16px;padding:6px 14px;border-radius:9px;font-size:10px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:1px;z-index:999;display:none;backdrop-filter:blur(20px);background:rgba(6,6,8,0.94);}#file-drop-overlay{position:fixed;inset:0;z-index:50;background:rgba(34,197,94,0.04);backdrop-filter:blur(3px);border:2px dashed rgba(34,197,94,0.35);pointer-events:none;display:none;align-items:center;justify-content:center;}#file-drop-overlay span{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:6px;color:rgba(34,197,94,0.75);}#content{position:relative;z-index:1;padding:70px 40px 44px;max-width:1100px;margin:0 auto;}#title{text-align:center;margin-bottom:8px;padding-top:10px;font-family:'Bebas Neue',cursive;font-size:clamp(32px,6vw,58px);letter-spacing:8px;line-height:1;color:#fff;animation:title-fade-in 0.8s ease-out both,title-glow 3s ease-in-out 0.8s infinite;}#title span{color:#22c55e;}#hint{text-align:center;margin-bottom:20px;color:rgba(255,255,255,0.15);font-size:10px;letter-spacing:1px;}#tiers{display:flex;flex-direction:column;gap:8px;}.tier-row{display:flex;align-items:stretch;width:100%;border-radius:18px;min-height:112px;overflow:hidden;border:1.5px solid;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);transition:all 0.2s;}.tier-accent{width:6px;min-width:6px;flex-shrink:0;}.tier-label{width:80px;min-width:80px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:51px;flex-shrink:0;transition:all 0.2s;}.tier-cards{display:flex;flex-wrap:wrap;gap:9px;padding:11px 14px;flex:1;align-items:center;align-content:flex-start;}.tier-empty{color:rgba(255,255,255,0.15);font-size:11px;letter-spacing:1px;font-style:italic;}#unranked-divider{display:flex;align-items:center;gap:12px;margin:6px 0 0;}#unranked-divider hr{flex:1;border:none;border-top:1px solid rgba(255,255,255,0.05);}#unranked-divider span{font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:4px;font-weight:700;}#unranked-pool{width:100%;border-radius:18px;min-height:112px;border:1.5px dashed rgba(255,255,255,0.08);background:rgba(255,255,255,0.018);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);padding:16px 20px;transition:all 0.2s;}#unranked-cards{display:flex;flex-wrap:wrap;gap:9px;align-items:center;}.nft-wrap{position:relative;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;}.nft-img-box{width:72px;height:72px;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,0.08);cursor:grab;background:rgba(0,0,0,0.35);transition:border-color 0.15s,box-shadow 0.15s;position:relative;user-select:none;}.nft-img-box img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}.nft-name{font-size:9px;font-family:'Space Mono',monospace;font-weight:700;color:rgba(255,255,255,0.55);text-align:center;width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.3px;}.insert-left{position:absolute;left:-7px;top:0;bottom:16px;width:3px;border-radius:2px;z-index:10;pointer-events:none;}.insert-right{position:absolute;right:-7px;top:0;bottom:16px;width:3px;border-radius:2px;z-index:10;pointer-events:none;}#ctx-menu{position:fixed;z-index:4000;background:rgba(8,8,14,0.97);backdrop-filter:blur(20px);border-radius:12px;padding:6px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.8);animation:ctx-appear 0.12s ease-out;display:none;}.ctx-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;padding:8px 12px;cursor:pointer;text-align:left;}.ctx-sep{height:1px;background:rgba(255,255,255,0.06);margin:4px 8px;}#modal-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.82);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;}#modal-box{background:rgba(10,10,14,0.96);border:1px solid rgba(155,89,255,0.38);border-radius:18px;padding:28px;width:320px;box-shadow:0 0 60px rgba(155,89,255,0.12);}#modal-title{font-family:'Bebas Neue',cursive;font-size:18px;color:#9B59FF;letter-spacing:4px;margin-bottom:14px;}#modal-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(155,89,255,0.4);border-radius:10px;color:#fff;font-family:'Space Mono',monospace;font-size:12px;padding:9px 12px;outline:none;box-sizing:border-box;margin-bottom:14px;}#modal-btns{display:flex;gap:8px;}#modal-save{flex:1;background:#9B59FF;border:none;border-radius:10px;color:#fff;font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;padding:9px 0;cursor:pointer;}#modal-cancel{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,255,255,0.4);font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;padding:9px 0;cursor:pointer;}#footer{text-align:center;margin-top:32px;padding-bottom:8px;}#footer a{display:inline-flex;align-items:center;gap:7px;color:rgba(255,255,255,0.3);font-family:'Space Mono',monospace;font-size:11px;text-decoration:none;letter-spacing:1px;}#footer a:hover{animation:link-pulse 1.1s ease-in-out infinite;}#footer a:hover .fc,#footer a:hover .fn{color:#22c55e!important;}.fc{color:rgba(255,255,255,0.35);}.fn{color:#22c55e;font-weight:700;}#ghost{position:fixed;pointer-events:none;z-index:9999;width:72px;height:72px;border-radius:16px;overflow:hidden;opacity:0.93;transform:translate(-50%,-50%) scale(1.1) rotate(2deg);display:none;}#ghost img{width:100%;height:100%;object-fit:cover;display:block;}
</style>
</head>
<body>
<div id="bg"></div>
<div id="ghost"><img id="ghost-img" src="" alt=""/></div>
<div id="navbar">
  <button class="nav-btn" id="btn-undo" onclick="undo()" disabled>&#8617; UNDO <span class="undo-badge" id="undo-badge" style="display:none"></span></button>
  <button class="nav-btn" id="btn-upload" onclick="document.getElementById('file-input').click()">&#8593; UPLOAD</button>
  <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)"/>
  <button class="nav-btn" id="btn-bake" onclick="bakeToHTML()">&#11015; СКАЧАТЬ ДЛЯ САЙТА</button>
</div>
<div id="toast"></div>
<div id="file-drop-overlay"><span>DROP TO UPLOAD</span></div>
<div id="ctx-menu">
  <button class="ctx-item" id="ctx-rename" onclick="ctxRename()"></button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" id="ctx-delete" onclick="ctxDelete()"></button>
</div>
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div id="modal-title">RENAME</div>
    <input id="modal-input" type="text" onkeydown="if(event.key==='Enter')modalSave();if(event.key==='Escape')closeModal();"/>
    <div id="modal-btns">
      <button id="modal-save" onclick="modalSave()">SAVE</button>
      <button id="modal-cancel" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>
<div id="content">
  <div id="title">ABSTRACT <span>NFT TIER LIST</span></div>
  <div id="hint">drag to move &middot; right click to rename / delete</div>
  <div id="tiers"></div>
  <div id="unranked-divider"><hr/><span>UNRANKED</span><hr/></div>
  <div id="unranked-pool"><div id="unranked-cards"></div></div>
  <div id="footer">
    <a href="https://x.com/Eyesblinks" target="_blank">
      <span class="fc">Created by</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="#22c55e"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.26 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      <span class="fn">Eyesblinks</span>
    </a>
  </div>
</div>
<script>
window._P=null;
var TIERS=[{id:"S",label:"S",color:"#9B59FF",glow:"rgba(155,89,255,0.6)",bg:"rgba(155,89,255,0.13)",border:"rgba(155,89,255,0.45)"},{id:"A",label:"A",color:"#7DF9FF",glow:"rgba(125,249,255,0.55)",bg:"rgba(125,249,255,0.10)",border:"rgba(125,249,255,0.40)"},{id:"B",label:"B",color:"#E2E2F8",glow:"rgba(226,226,248,0.50)",bg:"rgba(226,226,248,0.08)",border:"rgba(226,226,248,0.32)"},{id:"C",label:"C",color:"#FFD700",glow:"rgba(255,215,0,0.55)",bg:"rgba(255,215,0,0.10)",border:"rgba(255,215,0,0.42)"},{id:"D",label:"D",color:"#B0B0C0",glow:"rgba(176,176,192,0.45)",bg:"rgba(176,176,192,0.07)",border:"rgba(176,176,192,0.28)"},{id:"E",label:"E",color:"#CD7F32",glow:"rgba(205,127,50,0.55)",bg:"rgba(205,127,50,0.10)",border:"rgba(205,127,50,0.40)"}];
var STORAGE_KEY="nft-tierlist-v1",MAX_HISTORY=30;
var items=[],undoStack=[],dragId=null;
var currentDropZone=null,currentInsertBefore=null,currentInsertAfter=null;
var ctxItem=null,ctxColor=null,modalItem=null;
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(items));}catch(e){}}
function load(){try{var d=localStorage.getItem(STORAGE_KEY);if(d){items=JSON.parse(d);}else{items=JSON.parse(JSON.stringify(window._P||[]));try{localStorage.setItem(STORAGE_KEY,JSON.stringify(items));}catch(e){}}}catch(e){items=JSON.parse(JSON.stringify(window._P||[]));}render();}
var _tt;
function showToast(m,c,b){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";t.style.color=c;t.style.border="1px solid "+b;clearTimeout(_tt);_tt=setTimeout(function(){t.style.display="none";},2000);}
function pushHistory(){undoStack.push(JSON.parse(JSON.stringify(items)));if(undoStack.length>MAX_HISTORY)undoStack.shift();updateUndoBtn();}
function undo(){if(!undoStack.length)return;items=undoStack.pop();try{localStorage.setItem(STORAGE_KEY,JSON.stringify(items));}catch(e){}render();showToast("undone","#b47fff","rgba(155,89,255,0.4)");updateUndoBtn();}
function updateUndoBtn(){var btn=document.getElementById("btn-undo");var badge=document.getElementById("undo-badge");btn.disabled=!undoStack.length;if(undoStack.length){badge.style.display="inline";badge.textContent=undoStack.length;}else{badge.style.display="none";}}
function getTierItems(tid){return items.filter(function(i){return i.tier===tid;}).sort(function(a,b){return a.order-b.order;});}
function initBg(){var bg=document.getElementById("bg");for(var i=0;i<38;i++){var d=document.createElement("div");var sz=1.5+Math.random()*2.5,dur=2.5+Math.random()*4,dl=Math.random()*6;d.style.cssText="position:absolute;left:"+(Math.random()*100)+"%;top:"+(Math.random()*100)+"%;width:"+sz+"px;height:"+sz+"px;border-radius:50%;background:#fff;box-shadow:0 0 "+(sz*3)+"px "+sz+"px rgba(255,255,255,0.6);animation:dot-blink "+dur+"s "+dl+"s ease-in-out infinite;opacity:0;";bg.appendChild(d);}}
function render(){
  var el=document.getElementById("tiers");el.innerHTML="";
  TIERS.forEach(function(tier){
    var row=document.createElement("div");row.className="tier-row";row.dataset.zone=tier.id;
    row.style.cssText="background:rgba(255,255,255,0.02);border-color:"+tier.border+";box-shadow:0 2px 16px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.04);";
    var acc=document.createElement("div");acc.className="tier-accent";acc.style.background="linear-gradient(180deg,"+tier.color+" 0%,"+tier.color+"44 100%)";
    var lbl=document.createElement("div");lbl.className="tier-label";lbl.style.cssText="border-right:1px solid "+tier.border+";color:"+tier.color+";text-shadow:0 0 20px "+tier.color+"88;";lbl.textContent=tier.label;
    var cards=document.createElement("div");cards.className="tier-cards";
    var ri=getTierItems(tier.id);
    if(ri.length===0){var e=document.createElement("span");e.className="tier-empty";e.textContent="Drop "+tier.label+"-tier here...";cards.appendChild(e);}
    else{ri.forEach(function(it){cards.appendChild(makeCard(it,tier.color));});}
    row.appendChild(acc);row.appendChild(lbl);row.appendChild(cards);el.appendChild(row);
  });
  var pool=document.getElementById("unranked-cards");pool.innerHTML="";
  var ur=getTierItems(null);
  if(ur.length===0){var e=document.createElement("span");e.style.cssText="color:rgba(255,255,255,0.1);font-size:11px;";e.textContent="Upload or drag here to unrank";pool.appendChild(e);}
  else{ur.forEach(function(it){pool.appendChild(makeCard(it,"#888"));});}
  setupZones();
}
function makeCard(item,color){
  var wrap=document.createElement("div");wrap.className="nft-wrap";wrap.dataset.id=item.id;
  var box=document.createElement("div");box.className="nft-img-box";
  if(dragId===item.id)box.style.opacity="0";
  var img=document.createElement("img");img.src=item.image;img.alt=item.name;img.draggable=false;
  box.appendChild(img);
  box.addEventListener("mouseenter",function(){if(dragId)return;box.style.borderColor=color;box.style.boxShadow="0 0 22px "+color+"77,0 4px 16px rgba(0,0,0,0.6)";});
  box.addEventListener("mouseleave",function(){box.style.borderColor="rgba(255,255,255,0.08)";box.style.boxShadow="";});
  box.addEventListener("pointerdown",function(e){startDrag(e,item,color);});
  box.addEventListener("contextmenu",function(e){openCtx(e,item,color);});
  var nm=document.createElement("div");nm.className="nft-name";nm.textContent=item.name;
  if(dragId===item.id)nm.style.color="transparent";
  wrap.appendChild(box);wrap.appendChild(nm);return wrap;
}
function startDrag(e,item,color){
  if(e.button!==0)return;e.preventDefault();e.stopPropagation();
  var sx=e.clientX,sy=e.clientY,started=false;
  var ghost=document.getElementById("ghost"),gi=document.getElementById("ghost-img");
  function onMove(mv){
    var dx=mv.clientX-sx,dy=mv.clientY-sy;
    if(!started&&Math.sqrt(dx*dx+dy*dy)<5)return;
    if(!started){started=true;dragId=item.id;currentDropZone=null;currentInsertBefore=null;currentInsertAfter=null;document.body.style.cursor="grabbing";document.body.style.userSelect="none";gi.src=item.image;ghost.style.borderColor=color;ghost.style.boxShadow="0 8px 32px rgba(0,0,0,0.7),0 0 24px "+color+"88";ghost.style.display="block";render();}
    ghost.style.left=mv.clientX+"px";ghost.style.top=mv.clientY+"px";
    ghost.style.display="none";var el=document.elementFromPoint(mv.clientX,mv.clientY);ghost.style.display="block";
    clearInd();currentInsertBefore=null;currentInsertAfter=null;currentDropZone=null;
    if(!el)return;
    var cw=el.closest(".nft-wrap[data-id]");
    if(cw&&cw.dataset.id!==item.id){var r=cw.querySelector(".nft-img-box").getBoundingClientRect();var left=mv.clientX<r.left+r.width/2;if(left){currentInsertBefore=cw.dataset.id;showInd(cw,"left",color);}else{currentInsertAfter=cw.dataset.id;showInd(cw,"right",color);}var ze=cw.closest("[data-zone]");currentDropZone=ze?ze.dataset.zone:null;}
    else{var ze=el.closest("[data-zone]");if(ze){currentDropZone=ze.dataset.zone;hlZone(ze.dataset.zone,true,color);}}
  }
  function onUp(){
    document.removeEventListener("pointermove",onMove);document.removeEventListener("pointerup",onUp);
    document.body.style.cursor="";document.body.style.userSelect="";ghost.style.display="none";
    clearInd();clearZones();
    if(started){pushHistory();applyDrop(item.id,currentDropZone,currentInsertBefore,currentInsertAfter);}
    dragId=null;currentDropZone=null;currentInsertBefore=null;currentInsertAfter=null;render();
  }
  document.addEventListener("pointermove",onMove);document.addEventListener("pointerup",onUp);
}
function applyDrop(id,zone,ib,ia){
  var dr=items.find(function(i){return i.id===id;});if(!dr)return;
  if(ib||ia){var rid=ib||ia;var rc=items.find(function(i){return i.id===rid;});if(!rc)return;var tier=rc.tier;var row=items.filter(function(i){return i.tier===tier&&i.id!==id;}).sort(function(a,b){return a.order-b.order;});var idx=row.findIndex(function(i){return i.id===rid;});row.splice(ia?idx+1:idx,0,Object.assign({},dr,{tier:tier}));row.forEach(function(it,i){it.order=i;});items=items.filter(function(i){return i.tier!==tier&&i.id!==id;}).concat(row);save();return;}
  if(!zone)return;var tier=zone==="__unranked__"?null:zone;var t=items.filter(function(i){return i.tier===tier&&i.id!==id;});var max=t.length?Math.max.apply(null,t.map(function(i){return i.order;})):-1;var it=items.find(function(i){return i.id===id;});if(it){it.tier=tier;it.order=max+1;}save();
}
function showInd(w,s,c){var d=document.createElement("div");d.className=s==="left"?"insert-left":"insert-right";d.style.background=c;d.style.boxShadow="0 0 10px "+c;d.dataset.ii="1";w.appendChild(d);}
function clearInd(){document.querySelectorAll("[data-ii]").forEach(function(e){e.remove();});}
function hlZone(id,on,c){var el=document.querySelector("[data-zone='"+id+"']");if(!el)return;if(id==="__unranked__"){el.style.borderColor=on?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.08)";el.style.background=on?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.018)";}else{var tier=TIERS.find(function(t){return t.id===id;});if(tier){el.style.borderColor=on?tier.color:tier.border;el.style.background=on?tier.color+"08":"rgba(255,255,255,0.02)";el.style.boxShadow=on?"0 0 0 1px "+tier.color+"44,0 0 40px "+tier.glow+",inset 0 0 30px "+tier.bg:"0 2px 16px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.04)";var lb=el.querySelector(".tier-label");if(lb)lb.style.color=on?"#fff":tier.color;}}}
function clearZones(){TIERS.forEach(function(t){var el=document.querySelector("[data-zone='"+t.id+"']");if(el){el.style.borderColor=t.border;el.style.background="rgba(255,255,255,0.02)";el.style.boxShadow="0 2px 16px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.04)";var lb=el.querySelector(".tier-label");if(lb)lb.style.color=t.color;}});var up=document.getElementById("unranked-pool");if(up){up.style.borderColor="rgba(255,255,255,0.08)";up.style.background="rgba(255,255,255,0.018)";}}
function setupZones(){document.querySelectorAll("[data-zone]").forEach(function(el){el.addEventListener("mouseenter",function(){if(dragId&&!currentInsertBefore&&!currentInsertAfter)hlZone(el.dataset.zone,true,null);});el.addEventListener("mouseleave",function(){clearZones();});});}
function handleFiles(files){var arr=Array.from(files).filter(function(f){return f.type.startsWith("image/");});if(!arr.length)return;var done=0;arr.forEach(function(file){var r=new FileReader();r.onload=function(ev){pushHistory();items.push({id:"nft-"+Date.now()+"-"+Math.random().toString(36).slice(2),name:file.name.replace(/\.[^.]+$/,""),image:ev.target.result,tier:null,order:Date.now()+done});done++;if(done===arr.length){save();render();}};r.readAsDataURL(file);});}
