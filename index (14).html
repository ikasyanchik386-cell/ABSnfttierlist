er:1.5px solid;backdrop-filter:blur(28px);transition:all 0.2s;}.tier-accent{width:6px;min-width:6px;flex-shrink:0;}.tier-label{width:80px;min-width:80px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:51px;flex-shrink:0;transition:all 0.2s;}.drag-placeholder{}.tier-cards{display:flex;flex-wrap:wrap;gap:9px;padding:11px 14px;flex:1;align-items:center;align-content:flex-start;}.tier-empty{color:rgba(255,255,255,0.15);font-size:11px;letter-spacing:1px;font-style:italic;}#unranked-divider{display:flex;align-items:center;gap:12px;margin:6px 0 0;}#unranked-divider hr{flex:1;border:none;border-top:1px solid rgba(255,255,255,0.05);}#unranked-divider span{font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:4px;font-weight:700;}#unranked-pool{width:100%;border-radius:18px;min-height:112px;border:1.5px dashed rgba(255,255,255,0.08);background:rgba(255,255,255,0.018);backdrop-filter:blur(28px);padding:16px 20px;transition:all 0.2s;}#unranked-cards{display:flex;flex-wrap:wrap;gap:9px;align-items:center;}.nft-wrap{position:relative;transition:transform 0.18s cubic-bezier(0.4,0,0.2,1),opacity 0.15s;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;}.nft-img-box{width:72px;height:72px;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,0.08);cursor:grab;background:rgba(0,0,0,0.35);transition:border-color 0.15s,box-shadow 0.15s;position:relative;user-select:none;}.nft-img-box img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}.nft-name{font-size:9px;font-family:'Space Mono',monospace;font-weight:700;color:rgba(255,255,255,0.55);text-align:center;width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.insert-left{position:absolute;left:-7px;top:0;bottom:16px;width:3px;border-radius:2px;z-index:10;pointer-events:none;}.insert-right{position:absolute;right:-7px;top:0;bottom:16px;width:3px;border-radius:2px;z-index:10;pointer-events:none;}#ctx-menu{position:fixed;z-index:4000;background:rgba(8,8,14,0.97);backdrop-filter:blur(20px);border-radius:12px;padding:6px;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,0.8);animation:ctx-appear 0.12s ease-out;display:none;}.ctx-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;padding:8px 12px;cursor:pointer;text-align:left;}.ctx-sep{height:1px;background:rgba(255,255,255,0.06);margin:4px 8px;}#modal-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.82);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;}#modal-box{background:rgba(10,10,14,0.96);border:1px solid rgba(155,89,255,0.38);border-radius:18px;padding:28px;width:340px;box-shadow:0 0 60px rgba(155,89,255,0.12);}#modal-title{font-family:'Bebas Neue',cursive;font-size:18px;color:#9B59FF;letter-spacing:4px;margin-bottom:14px;}#modal-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(155,89,255,0.4);border-radius:10px;color:#fff;font-family:'Space Mono',monospace;font-size:12px;padding:9px 12px;outline:none;box-sizing:border-box;margin-bottom:10px;}#modal-btns{display:flex;gap:8px;}#modal-save{flex:1;background:#9B59FF;border:none;border-radius:10px;color:#fff;font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;padding:9px 0;cursor:pointer;}#modal-cancel{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,255,255,0.4);font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;padding:9px 0;cursor:pointer;}#footer{text-align:center;margin-top:40px;padding-bottom:16px;animation:footer-rise 0.9s cubic-bezier(0.16,1,0.3,1) 0.6s both;}@keyframes footer-rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}#footer a{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.5);font-family:'Space Mono',monospace;font-size: ity 0.08s;}</style>

function startDrag(e,item,color){
  if(e.button!==0)return;
  e.preventDefault();e.stopPropagation();
  try{e.target.releasePointerCapture(e.pointerId);}catch(ex){}

  // Ghost setup
  var ghost=document.getElementById("ghost"),gi=document.getElementById("ghost-img");
  gi.src=item.image;
  ghost.style.borderColor=color;
  ghost.style.boxShadow="0 8px 32px rgba(0,0,0,0.7),0 0 24px "+color+"88";
  ghost.style.left=e.clientX+"px";ghost.style.top=e.clientY+"px";
  ghost.style.display="block";
  document.body.style.cursor="grabbing";
  document.body.style.userSelect="none";

  // Create placeholder — invisible card that holds the slot
  var ph=document.createElement("div");
  ph.className="nft-wrap drag-placeholder";
  ph.dataset.placeholder="1";
  ph.style.cssText="width:86px;height:103px;flex-shrink:0;pointer-events:none;opacity:0;";

  // Find source card, replace with placeholder
  dragId=item.id;
  var srcCard=document.querySelector(".nft-wrap[data-id='"+item.id+"']");
  if(srcCard&&srcCard.parentElement){
    srcCard.parentElement.insertBefore(ph,srcCard);
    srcCard.parentElement.removeChild(srcCard);
  }

  var dZone=null;

  function getZone(mx,my){
    ghost.style.display="none";
    var el=document.elementFromPoint(mx,my);
    ghost.style.display="block";
    if(!el)return null;
    var cur=el;
    while(cur&&cur!==document.body){
      if(cur.id==="unranked-pool"||cur.id==="unranked-cards")return "__unranked__";
      if(cur.dataset&&cur.dataset.zone)return cur.dataset.zone;
      cur=cur.parentElement;
    }
    var up=document.getElementById("unranked-pool");
    if(up){var r=up.getBoundingClientRect();if(mx>=r.left&&mx<=r.right&&my>=r.top&&my<=r.bottom)return "__unranked__";}
    return null;
  }

    function movePlaceholder(mx,my){
    ghost.style.display="none";
    var el=document.elementFromPoint(mx,my);
    ghost.style.display="block";
    if(!el)return;

    // Find target card (any tier or unranked)
    var cw=el.closest(".nft-wrap[data-id]:not([data-placeholder])");
    if(cw){
      var r=cw.getBoundingClientRect();
      var isLeft=mx<r.left+r.width/2;
      var cont=cw.parentElement;
      if(!cont)return;
      var refNode=isLeft?cw:cw.nextSibling;
      if(ph.nextSibling===refNode&&ph.parentElement===cont)return;

      flipMove(cont,function(){cont.insertBefore(ph,refNode);});
      return;
    }

    // Over a tier-cards container (empty or gap at end)
    var tc=el.closest(".tier-cards");
    if(tc){
      if(ph.parentElement===tc&&!tc.querySelector(".nft-wrap[data-id]:not([data-placeholder])~.nft-wrap[data-id]:not([data-placeholder])"))return;
      if(ph.parentElement!==tc){flipMove(tc,function(){tc.appendChild(ph);});}
      return;
    }

    // Over unranked-cards
    var uc=el.closest("#unranked-cards");
    if(uc){
      if(ph.parentElement===uc)return;
      flipMove(uc,function(){uc.appendChild(ph);});
    }
  }

  function flipMove(cont,moveFn){
    var cards=Array.from(cont.querySelectorAll(".nft-wrap[data-id]:not([data-placeholder])"));
    // also grab cards from ph's old container if different
    var oldCont=ph.parentElement;
    var oldCards=oldCont&&oldCont!==cont?Array.from(oldCont.querySelectorAll(".nft-wrap[data-id]:not([data-placeholder])")):[];
    var allCards=cards.concat(oldCards.filter(function(c){return cards.indexOf(c)===-1;}));

    // Record before positions
    var before={};
    allCards.forEach(function(c){
      var r=c.getBoundingClientRect();
      before[c.dataset.id]={x:r.left,y:r.top};
      c.style.transition="none";
      c.style.transform="";
    });

    // Do the DOM move
    moveFn();

    // Animate
    requestAnimationFrame(function(){
      allCards.forEach(function(c){
        var r=c.getBoundingClientRect();
        var b=before[c.dataset.id];
        if(!b)return;
        var dx=b.x-r.left,dy=b.y-r.top;
        if(Math.abs(dx)<0.5&&Math.abs(dy)<0.5)return;
        c.style.transition="none";
        c.style.transform="translate("+dx+"px,"+dy+"px)";
        requestAnimationFrame(function(){
          c.style.transition="transform 0.16s cubic-bezier(0.25,0.46,0.45,0.94)";
          c.style.transform="";
        });
      });
    });
  }

  function onMove(mv){
    ghost.style.left=mv.clientX+"px";ghost.style.top=mv.clientY+"px";
    clearZones();
    var up=document.getElementById("unranked-pool");
    if(up){up.style.borderColor="rgba(255,255,255,0.08)";up.style.background="rgba(255,255,255,0.018)";up.style.boxShadow="";}

    dZone=getZone(mv.clientX,mv.clientY);

    if(dZone==="__unranked__"){
      if(up){up.style.borderColor="rgba(255,255,255,0.45)";up.style.background="rgba(255,255,255,0.08)";up.style.boxShadow="0 0 0 2px rgba(255,255,255,0.2)";}
      // move placeholder to unranked
      var uc=document.getElementById("unranked-cards");
      if(uc&&ph.parentElement!==uc)uc.appendChild(ph);
      return;
    }
    if(dZone)hlZone(dZone,true,color);

    movePlaceholder(mv.clientX,mv.clientY);
  }

  function onUp(){
    document.removeEventListener("pointermove",onMove,true);
    document.removeEventListener("pointerup",onUp,true);
    document.body.style.cursor="";document.body.style.userSelect="";
    ghost.style.display="none";
    clearInd();clearZones();
    var up=document.getElementById("unranked-pool");
    if(up){up.style.borderColor="";up.style.background="";up.style.boxShadow="";}

    // Read final position from placeholder location
    var phParent=ph.parentElement;
    var newTier=null;
    if(phParent){
      if(phParent.id==="unranked-cards"){
        newTier=null;
      } else if(phParent.dataset&&phParent.dataset.zone){
        newTier=phParent.dataset.zone;
      } else {
        // try parent
        var p2=phParent.parentElement;
        if(p2&&p2.dataset&&p2.dataset.zone)newTier=p2.dataset.zone;
      }

      // Build new order from DOM
      var siblings=Array.from(phParent.querySelectorAll(".nft-wrap[data-id]:not([data-placeholder])"));
      var phIdx=Array.from(phParent.children).indexOf(ph);

      // Remove placeholder from DOM
      phParent.removeChild(ph);

      pushHistory();
      var dr=items.find(function(i){return i.id===item.id;});
      if(dr){
        // Get all items in this container
        var tierItems=items.filter(function(i){return i.tier===newTier&&i.id!==item.id;}).sort(function(a,b){return a.order-b.order;});
        // Insert drag item at phIdx position among siblings
        // siblings gives us the ordered IDs of existing cards
        var orderedIds=siblings.map(function(el){return el.dataset.id;});
        // find insert index by counting siblings before phIdx
        var insertAt=0;
        var phDomIdx=phIdx;
        // count non-placeholder siblings before ph
        var allChildren=Array.from(phParent.children);
        var count=0;
        for(var i=0;i<allChildren.length;i++){
          if(allChildren[i]===ph)break; // ph already removed, use phIdx
        }
        insertAt=Math.min(phIdx,orderedIds.length);

        // Rebuild order
        orderedIds.splice(insertAt,0,item.id);
        orderedIds.forEach(function(id,idx){
          var it=items.find(function(i){return i.id===id;});
          if(it){it.tier=newTier;it.order=idx;}
        });
        save();
      }
    } else {
      ph.parentElement&&ph.parentElement.removeChild(ph);
    }

    dragId=null;
    render();

    requestAnimationFrame(function(){
      var card=document.querySelector(".nft-wrap[data-id='"+item.id+"']");
      if(card){
        card.style.transition="none";card.style.opacity="0";card.style.transform="scale(0.85)";
        requestAnimationFrame(function(){
          card.style.transition="opacity 0.15s,transform 0.15s";
          card.style.opacity="1";card.style.transform="scale(1)";
        });
      }
    });
  }

  document.addEventListener("pointermove",onMove,true);
  document.addEventListener("pointerup",onUp,true);
}

function applyDrop(id,zone,ib,ia){
  var dr=items.find(function(i){return i.id===id;});if(!dr)return;
  if(ib||ia){
    var rid=ib||ia;var rc=items.find(function(i){return i.id===rid;});if(!rc)return;
    var tier=rc.tier;
    var row=items.filter(function(i){return i.tier===tier&&i.id!==id;}).sort(function(a,b){return a.order-b.order;});
    var idx=row.findIndex(function(i){return i.id===rid;});
    row.splice(ia?idx+1:idx,0,Object.assign({},dr,{tier:tier}));
    row.forEach(function(it,i){it.order=i;});
    items=items.filter(function(i){return i.tier!==tier&&i.id!==id;}).concat(row);
    save();return;
  }
  if(!zone)return;
  var tier=zone==="__unranked__"?null:zone;
  var t=items.filter(function(i){return i.tier===tier&&i.id!==id;});
  var max=t.length?Math.max.apply(null,t.map(function(i){return i.order;})):-1;
  var it=items.find(function(i){return i.id===id;});
  if(it){it.tier=tier;it.order=max+1;}
  save();
}

function clearInd(){document.querySelectorAll("[data-ii]").forEach(function(e){e.remove();});}
function hlZone(id,on,c){var el=document.querySelector("[data-zone='"+id+"']");if(!el)return;if(id==="__unranked__"){el.style.borderColor=on?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.08)";el.style.background=on?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.018)";}else{var tier=TIERS.find(function(t){return t.id===id;});if(tier){el.style.borderColor=on?tier.color:tier.border;el.style.background=on?tier.color+"08":"rgba(255,255,255,0.02)";el.style.boxShadow=on?"0 0 0 1px "+tier.color+"44,0 0 40px "+tier.glow+",inset 0 0 30px "+tier.bg:"0 2px 16px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.04)";var lb=el.querySelector(".tier-label");if(lb)lb.style.color=on?"#fff":tier.color;}}}
function clearZones(){TIERS.forEach(function(t){var el=document.querySelector("[data-zone='"+t.id+"']");if(el){el.style.borderColor=t.border;el.style.background="rgba(255,255,255,0.02)";el.style.boxShadow="0 2px 16px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.04)";var lb=el.querySelector(".tier-label");if(lb)lb.style.color=t.color;}});var up=document.getElementById("unranked-pool");if(up){up.style.borderColor="rgba(255,255,255,0.08)";up.style.background="rgba(255,255,255,0.018)";}}
function setupZones(){document.querySelectorAll("[data-zone]").forEach(function(el){el.addEventListener("mouseenter",function(){if(dragId&&!currentInsertBefore&&!currentInsertAfter)hlZone(el.dataset.zone,true,null);});el.addEventListener("mouseleave",function(){clearZones();});});}
function openCtx(e,item,color){
  e.preventDefault();e.stopPropagation();ctxItem=item;ctxColor=color;
  var menu=document.getElementById("ctx-menu");
  menu.style.left=Math.min(e.clientX,window.innerWidth-180)+"px";
  menu.style.top=Math.min(e.clientY,window.innerHeight-140)+"px";
  menu.style.border="1px solid "+color+"44";menu.style.display="block";
  var rn=document.getElementById("ctx-rename");
  rn.style.color="rgba(255,255,255,0.85)";
  rn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Rename';
  rn.onmouseenter=function(){rn.style.background=color+"22";};rn.onmouseleave=function(){rn.style.background="none";};
  var sep=document.getElementById("ctx-sep-os");var os=document.getElementById("ctx-opensea");
  if(os){
    os.style.display=item.opensea?"flex":"none";if(sep)sep.style.display=item.opensea?"block":"none";
    if(item.opensea){
      os.style.color="#2081E2";
      os.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="#2081E2"><path d="M12 0C5.374 0 0 5.374 0 12s5.374 12 12 12 12-5.374 12-12S18.629 0 12 0zm-1.246 16.264l-3.6-3.6 1.06-1.06 2.54 2.54 5.486-5.486 1.06 1.06-6.546 6.546z"/></svg>OpenSea';
      os.onclick=function(){window.open(item.opensea,"_blank");closeCtx();};
      os.onmouseenter=function(){os.style.background="rgba(32,129,226,0.15)";};
      os.onmouseleave=function(){os.style.background="none";};
    }
  }
  var dl=document.getElementById("ctx-delete");
  dl.style.color="#f87171";
  dl.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>Delete';
  dl.onmouseenter=function(){dl.style.background="rgba(239,68,68,0.12)";};dl.onmouseleave=function(){dl.style.background="none";};}
function closeCtx(){document.getElementById("ctx-menu").style.display="none";}
function ctxRename(){closeCtx();if(ctxItem)openModal(ctxItem,"rename");}
function ctxDelete(){closeCtx();if(!ctxItem)return;pushHistory();items=items.filter(function(i){return i.id!==ctxItem.id;});save();render();}
document.addEventListener("click",function(){closeCtx();});
document.addEventListener("contextmenu",function(e){if(!e.target.closest(".nft-img-box"))closeCtx();});
function openModal(item,mode){
  modalItem=item;modalMode=mode||"rename";
  var inp=document.getElementById("modal-input");inp.value=item.name;
  document.getElementById("modal-overlay").style.display="flex";
  setTimeout(function(){inp.focus();},40);
}
function closeModal(){document.getElementById("modal-overlay").style.display="none";modalItem=null;}
function modalSave(){
  if(!modalItem)return;
  var val=document.getElementById("modal-input").value.trim();
  if(val){pushHistory();var it=items.find(function(i){return i.id===modalItem.id;});if(it){it.name=val;save();render();}}
  closeModal();
}
function handleFiles(files){var arr=Array.from(files).filter(function(f){return f.type.startsWith("image/");});if(!arr.length)return;var done=0;arr.forEach(function(file){var r=new FileReader();r.onload=function(ev){pushHistory();items.push({id:"nft-"+Date.now()+"-"+Math.random().toString(36).slice(2),name:file.name.replace(/\.[^.]+$/,""),image:ev.target.result,tier:null,order:Date.now()+done,opensea:""});done++;if(done===arr.length){save();render();}};r.readAsDataURL(file);});}
document.addEventListener("dragover",function(e){e.preventDefault();if([].slice.call(e.dataTransfer.types).indexOf("Files")>=0)document.getElementById("file-drop-overlay").style.display="flex";});
document.addEventListener("dragleave",function(e){if(!e.relatedTarget||e.relatedTarget===document.body)document.getElementById("file-drop-overlay").style.display="none";});
document.addEventListener("drop",function(e){e.preventDefault();document.getElementById("file-drop-overlay").style.display="none";if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);});
initBg();
load();
</script>
